name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: apiuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: apipromocao_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Prisma Client
      run: npx prisma generate
      env:
        DATABASE_URL: postgresql://apiuser:testpassword@localhost:5432/apipromocao_test
    
    - name: Run database migrations
      run: npx prisma db push
      env:
        DATABASE_URL: postgresql://apiuser:testpassword@localhost:5432/apipromocao_test
    
    - name: Run tests
      run: npm test
      env:
        DATABASE_URL: postgresql://apiuser:testpassword@localhost:5432/apipromocao_test
        API_SECRET_TOKEN: test-token
